<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roundly — Interval Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <!-- ====== PANEL DE CONFIGURACIÓN ====== -->
      <section class="setup-panel" aria-labelledby="app-title">
        <!-- Language tab -->
        <div class="lang-tab" id="langTab">
          <button class="lang-option is-active" data-lang="es" type="button">ES</button>
          <button class="lang-option" data-lang="en" type="button">EN</button>
        </div>

        <div class="brand-row">
          <img class="brand-logo" src="assets/logo.png" alt="Roundly logo" width="96" height="96">
          <div>
            <p class="eyebrow" data-i18n="eyebrow">Temporizador de intervalos</p>
            <h1 id="app-title">Roundly</h1>
            <p class="tagline" data-i18n="tagline">entrena . supérate . evoluciona</p>
          </div>
        </div>

        <!-- Presets -->
        <div class="preset-row" id="presetRow">
          <button class="preset-chip is-active" data-preset="tabata" data-work="20" data-rest="10" data-longrest="60" data-reps="8" data-series="1" data-rounds="1">Tabata 20/10</button>
          <button class="preset-chip" data-preset="hiit" data-work="45" data-rest="15" data-longrest="60" data-reps="4" data-series="3" data-rounds="1">HIIT 45/15</button>
          <button class="preset-chip" data-preset="custom" data-i18n="custom">Personalizado</button>
        </div>

        <!-- Ciclo 1 -->
        <div class="cycle-group">
          <div class="cycle-group-label" data-i18n="cycle1">Un ciclo se repite varias veces</div>
          <div class="settings-grid">
            <label>
              <span data-i18n="work">Ejercicio</span>
              <input id="work-seconds" type="number" min="1" max="3600" value="45" inputmode="numeric">
              <small data-i18n="workSmall">Segundos por serie</small>
            </label>
            <label>
              <span data-i18n="rest">Descanso corto</span>
              <input id="rest-seconds" type="number" min="0" max="3600" value="15" inputmode="numeric">
              <small data-i18n="restSmall">Entre repeticiones</small>
            </label>
            <label>
              <span data-i18n="reps">Repeticiones</span>
              <input id="repetitions" type="number" min="1" max="99" value="4" inputmode="numeric">
              <small data-i18n="repsSmall">Por ejercicio</small>
            </label>
          </div>
        </div>

        <div class="cycle-connector" data-i18n="connector">↓ luego un descanso largo ↓</div>

        <!-- Ciclo 2 -->
        <div class="cycle-group">
          <div class="cycle-group-label" data-i18n="cycle2">Ese bloque se repite en series y rondas</div>
          <div class="settings-grid">
            <label>
              <span data-i18n="longRest">Descanso largo</span>
              <input id="long-rest-seconds" type="number" min="0" max="7200" value="60" inputmode="numeric">
              <small data-i18n="longRestSmall">Para cambiar de ejercicio</small>
            </label>
            <label>
              <span data-i18n="series">Series</span>
              <input id="exercise-count" type="number" min="1" max="99" value="3" inputmode="numeric">
              <small data-i18n="seriesSmall">Por ronda</small>
            </label>
            <label>
              <span data-i18n="rounds">Rondas</span>
              <input id="round-count" type="number" min="1" max="99" value="1" inputmode="numeric">
              <small data-i18n="roundsSmall">Bloques completos</small>
            </label>
          </div>
        </div>

        <!-- Resumen -->
        <div class="live-summary">
          <span data-i18n="duration">Duración total estimada</span>
          <strong id="totalDuration">—</strong>
        </div>

        <!-- Footer -->
        <div class="settings-grid">
          <label class="toggle-row">
            <input id="sound-enabled" type="checkbox" checked>
            <span data-i18n="sounds">Sonidos de cambio</span>
          </label>
          <button class="primary-action" id="startBtn" type="button" data-i18n="start">Iniciar entrenamiento</button>
        </div>
      </section>

      <!-- ====== PANTALLA DEL TEMPORIZADOR ====== -->
      <section class="timer-stage" aria-live="polite">
        <div class="stage-top">
          <button id="back-button" class="icon-button" type="button" aria-label="Volver">←</button>
          <div class="phase-pill" id="phase-pill">Listo</div>
          <button id="fullscreen-button" class="icon-button" type="button" aria-label="Pantalla completa">⛶</button>
        </div>

        <div class="countdown-wrap" aria-label="Tiempo restante">
          <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
            <circle class="ring-track" cx="110" cy="110" r="101"></circle>
            <g class="ring-ticks">
              <line class="tick-major" x1="210.0" y1="110.0" x2="200.0" y2="110.0"></line>
              <line class="tick-minor" x1="206.6" y1="135.9" x2="201.8" y2="134.6"></line>
              <line class="tick-minor" x1="196.6" y1="160.0" x2="192.3" y2="157.5"></line>
              <line class="tick-minor" x1="180.7" y1="180.7" x2="177.2" y2="177.2"></line>
              <line class="tick-minor" x1="160.0" y1="196.6" x2="157.5" y2="192.3"></line>
              <line class="tick-minor" x1="135.9" y1="206.6" x2="134.6" y2="201.8"></line>
              <line class="tick-major" x1="110.0" y1="210.0" x2="110.0" y2="200.0"></line>
              <line class="tick-minor" x1="84.1" y1="206.6" x2="85.4" y2="201.8"></line>
              <line class="tick-minor" x1="60.0" y1="196.6" x2="62.5" y2="192.3"></line>
              <line class="tick-minor" x1="39.3" y1="180.7" x2="42.8" y2="177.2"></line>
              <line class="tick-minor" x1="23.4" y1="160.0" x2="27.7" y2="157.5"></line>
              <line class="tick-minor" x1="13.4" y1="135.9" x2="18.2" y2="134.6"></line>
              <line class="tick-major" x1="10.0" y1="110.0" x2="20.0" y2="110.0"></line>
              <line class="tick-minor" x1="13.4" y1="84.1" x2="18.2" y2="85.4"></line>
              <line class="tick-minor" x1="23.4" y1="60.0" x2="27.7" y2="62.5"></line>
              <line class="tick-minor" x1="39.3" y1="39.3" x2="42.8" y2="42.8"></line>
              <line class="tick-minor" x1="60.0" y1="23.4" x2="62.5" y2="27.7"></line>
              <line class="tick-minor" x1="84.1" y1="13.4" x2="85.4" y2="18.2"></line>
              <line class="tick-major" x1="110.0" y1="10.0" x2="110.0" y2="20.0"></line>
              <line class="tick-minor" x1="135.9" y1="13.4" x2="134.6" y2="18.2"></line>
              <line class="tick-minor" x1="160.0" y1="23.4" x2="157.5" y2="27.7"></line>
              <line class="tick-minor" x1="180.7" y1="39.3" x2="177.2" y2="42.8"></line>
              <line class="tick-minor" x1="196.6" y1="60.0" x2="192.3" y2="62.5"></line>
              <line class="tick-minor" x1="206.6" y1="84.1" x2="201.8" y2="85.4"></line>
            </g>
            <circle id="ring-progress" class="ring-progress" cx="110" cy="110" r="101"></circle>
          </svg>
          <div class="time-stack">
            <div id="phase-label" class="phase-label">Ejercicio</div>
            <div id="time-display" class="time-display">00:45</div>
            <div id="next-label" class="next-label">Siguiente: descanso corto</div>
          </div>
        </div>

        <div class="progress-board">
          <div>
            <span data-i18n="repLabel">Repetición</span>
            <strong id="rep-display">1/4</strong>
          </div>
          <div>
            <span data-i18n="exerciseLabel">Ejercicio</span>
            <strong id="exercise-display">1/3</strong>
          </div>
          <div>
            <span data-i18n="roundLabel">Ronda</span>
            <strong id="round-display">1/1</strong>
          </div>
        </div>

        <div class="stage-controls">
          <button id="pause-button" class="secondary-action" type="button">Pausar</button>
          <button id="reset-button" class="danger-action" type="button">Reiniciar</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
